---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arondo-prod
  namespace: default
  labels:
    app: arondo-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arondo-prod
  template:
    metadata:
      labels:
        app: arondo-prod
    spec:
      nodeSelector:
        kubernetes.io/hostname: nur
      volumes:
        - name: data
          hostPath:
            path: /mnt/coder-sharepoint/arondo/data
            type: DirectoryOrCreate
        - name: coder-workspaces
          hostPath:
            path: /mnt/coder-workspaces
            type: Directory
      containers:
        - name: app
          image: cloudpublic/default/arondo:latest
          imagePullPolicy: Always
          volumeMounts:
            - name: data
              mountPath: /data
          env:
            - name: ALLOWED_DEV_ORIGINS
              value: arondo.__{{infra.domains:f:x}}__
            - name: DATA_DIR
              value: /data
          ports:
            - name: default
              containerPort: 3250
            - name: notfound
              containerPort: 52341
          startupProbe:
            httpGet:
              path: /ping
              port: default
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: default
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: default
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: arondo-prod
  namespace: default
  labels:
    app: arondo-prod
spec:
  type: ClusterIP
  selector:
    app: arondo-prod
  ports:
    - name: default
      port: 80
      protocol: TCP
      targetPort: default
    - name: notfound
      port: 404
      protocol: TCP
      targetPort: notfound

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arondo-prod
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cluster-letsencrypt-dns-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: middleware-playonjan@kubernetescrd,middleware-antimitm@kubernetescrd,sso-domainx@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: AI
    gethomepage.dev/name: Arondo
    gethomepage.dev/href: https://arondo.__{{infra.domains:f:x}}__/
    gethomepage.dev/weight: "5"
spec:
  ingressClassName: traefik
  rules:
    - host: arondo.__{{infra.domains:f:x}}__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: arondo-prod
                port:
                  name: default
          - path: /runner
            pathType: Prefix
            backend:
              service:
                name: arondo-prod
                port:
                  name: notfound
  tls:
    - hosts:
        - arondo.__{{infra.domains:f:x}}__
      secretName: arondo-domainx

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arondo-prod-runner
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cluster-letsencrypt-dns-cloudflare
spec:
  ingressClassName: traefik
  rules:
    - host: arondo-runner.home4p.__{{infra.domains:f:x}}__
      http:
        paths:
          - path: /runner
            pathType: Prefix
            backend:
              service:
                name: arondo-prod
                port:
                  name: default
  tls:
    - hosts:
        - arondo-runner.home4p.__{{infra.domains:f:x}}__
      secretName: arondo-runner-home4p-domainx
