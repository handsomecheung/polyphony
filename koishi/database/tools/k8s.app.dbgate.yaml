---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dbgate-dns-config
  namespace: default
data:
  hosts: |
    __{{db.ci-jsf.newsub.aws.prod:f:ip}}__ __{{db.ci-jsf.newsub.aws.prod:f:host}}__
    __{{db.ci-jsf.newsub.aws.dev:f:ip}}__ __{{db.ci-jsf.newsub.aws.dev:f:host}}__

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sablierdbgate
  namespace: default
spec:
  plugin:
    sablier:
      sablierUrl: "http://sablier.sablier"
      group: "dbgate"
      sessionDuration: "1h"
      dynamic:
        theme: "ghost"
        showDetails: true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbgate
  namespace: default
  labels:
    app.kubernetes.io/name: dbgate
    sablier.enable: "true"
    sablier.group: "dbgate"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: dbgate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dbgate
    spec:
      volumes:
        - name: dns-config
          configMap:
            name: dbgate-dns-config
        - name: coder-workspaces
          persistentVolumeClaim:
            claimName: nfs-disk-coder-workspaces
      containers:
        - name: app
          image: cloudpublic/default/dbgate:latest
          imagePullPolicy: Always
          volumeMounts:
            - name: dns-config
              mountPath: /etc/hosts
              subPath: hosts
              readOnly: true
            - name: coder-workspaces
              subPath: private-workspace/workspace/encrypted-configs/.subscout/subscout.db
              mountPath: /tmp/subscout/subscout.db
            - name: coder-workspaces
              subPath: private-workspace/repos/local/openclaw-data/default/data/memory/main.sqlite
              mountPath: /tmp/openclaw-default/main.sqlite
              readOnly: true
            - name: coder-workspaces
              subPath: private-workspace/repos/local/openclaw-data/kzk/data/memory/main.sqlite
              mountPath: /tmp/openclaw-kzk/main.sqlite
              readOnly: true
          env:
            - name: CONNECTIONS
              value: postgreslocal,postgresckdev,postgresckprod,pushionsprod,cijsfawsdev,cijsfawsprod,ciipasssystem,ciipasseucdev,ciipasseucprod,ciipasslibrary,subscout,openclawdefault,openclawkzk

            - name: LABEL_postgreslocal
              value: Koishi PostgreSQL Local
            - name: SERVER_postgreslocal
              value: postgres.database
            - name: PORT_postgreslocal
              value: "5432"
            - name: USER_postgreslocal
              value: postgres
            - name: PASSWORD_postgreslocal
              value: "__{{database.postgres-local.accounts:f:postgres}}__"
            - name: ENGINE_postgreslocal
              value: postgres@dbgate-plugin-postgres

            - name: LABEL_postgresckdev
              value: Koishi PostgreSQL CK Dev
            - name: SERVER_postgresckdev
              value: postgres-rw.ck-dev
            - name: PORT_postgresckdev
              value: "5432"
            - name: USER_postgresckdev
              value: postgres
            - name: PASSWORD_postgresckdev
              value: "__{{database.postgres.ck-dev.accounts:f:postgres}}__"
            - name: ENGINE_postgresckdev
              value: postgres@dbgate-plugin-postgres

            - name: LABEL_postgresckprod
              value: Koishi PostgreSQL CK Prod
            - name: SERVER_postgresckprod
              value: postgres.ck-prod
            - name: PORT_postgresckprod
              value: "5432"
            - name: USER_postgresckprod
              value: postgres
            - name: PASSWORD_postgresckprod
              value: "__{{database.postgres.ck-prod.accounts:f:postgres}}__"
            - name: ENGINE_postgresckprod
              value: postgres@dbgate-plugin-postgres

            - name: LABEL_pushionsprod
              value: Pushions-Prod
            - name: SERVER_pushionsprod
              value: database.ck-pushion-prod
            - name: PORT_pushionsprod
              value: "5432"
            - name: USER_pushionsprod
              value: pushions
            - name: PASSWORD_pushionsprod
              value: "__{{pushion.db.pushions}}__"
            - name: ENGINE_pushionsprod
              value: postgres@dbgate-plugin-postgres

            - name: LABEL_cijsfawsdev
              value: CI-JSF-Dev
            - name: SERVER_cijsfawsdev
              value: __{{db.ci-jsf.newsub.aws.dev:f:host}}__
            - name: PORT_cijsfawsdev
              value: "3306"
            - name: USER_cijsfawsdev
              value: jsfnewsubuser
            - name: PASSWORD_cijsfawsdev
              value: "__{{db.ci-jsf.newsub.aws.dev}}__"
            - name: ENGINE_cijsfawsdev
              value: mysql@dbgate-plugin-mysql

            - name: LABEL_cijsfawsprod
              value: CI-JSF-Prod
            - name: SERVER_cijsfawsprod
              value: __{{db.ci-jsf.newsub.aws.prod:f:host}}__
            - name: PORT_cijsfawsprod
              value: "3306"
            - name: USER_cijsfawsprod
              value: jsfprodadmin
            - name: PASSWORD_cijsfawsprod
              value: "__{{db.ci-jsf.newsub.aws.prod}}__"
            - name: ENGINE_cijsfawsprod
              value: mysql@dbgate-plugin-mysql

            - name: LABEL_ciipasssystem
              value: CI-IPASS-System
            - name: SERVER_ciipasssystem
              value: database-system.ci-ipass
            - name: PORT_ciipasssystem
              value: "1433"
            - name: USER_ciipasssystem
              value: sa
            - name: PASSWORD_ciipasssystem
              value: "Test@123"
            - name: ENGINE_ciipasssystem
              value: mssql@dbgate-plugin-mssql

            - name: LABEL_ciipasseucdev
              value: CI-IPASS-EUC-Dev
            - name: SERVER_ciipasseucdev
              value: database-eucdev.ci-ipass
            - name: PORT_ciipasseucdev
              value: "1433"
            - name: USER_ciipasseucdev
              value: sa
            - name: PASSWORD_ciipasseucdev
              value: "Test@123"
            - name: ENGINE_ciipasseucdev
              value: mssql@dbgate-plugin-mssql

            - name: LABEL_ciipasseucprod
              value: CI-IPASS-EUC-Prod
            - name: SERVER_ciipasseucprod
              value: database-eucprod.ci-ipass
            - name: PORT_ciipasseucprod
              value: "1433"
            - name: USER_ciipasseucprod
              value: sa
            - name: PASSWORD_ciipasseucprod
              value: "Test@123"
            - name: ENGINE_ciipasseucprod
              value: mssql@dbgate-plugin-mssql

            - name: LABEL_ciipasslibrary
              value: CI-IPASS-Library
            - name: SERVER_ciipasslibrary
              value: database-library.ci-ipass
            - name: PORT_ciipasslibrary
              value: "1433"
            - name: USER_ciipasslibrary
              value: sa
            - name: PASSWORD_ciipasslibrary
              value: "Test@123"
            - name: ENGINE_ciipasslibrary
              value: mssql@dbgate-plugin-mssql

            - name: LABEL_subscout
              value: SubScout
            - name: FILE_subscout
              value: /tmp/subscout/subscout.db
            - name: ENGINE_subscout
              value: sqlite@dbgate-plugin-sqlite

            - name: LABEL_openclawdefault
              value: OpenClaw Default
            - name: FILE_openclawdefault
              value: /tmp/openclaw-default/main.sqlite
            - name: ENGINE_openclawdefault
              value: sqlite@dbgate-plugin-sqlite

            - name: LABEL_openclawkzk
              value: OpenClaw KZK
            - name: FILE_openclawkzk
              value: /tmp/openclaw-kzk/main.sqlite
            - name: ENGINE_openclawkzk
              value: sqlite@dbgate-plugin-sqlite

          ports:
            - name: default
              containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: dbgate
  namespace: default
  labels:
    app.kubernetes.io/name: dbgate
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dbgate
  ports:
    - name: default
      port: 3000
      protocol: TCP
      targetPort: default

---
# dbgate-root handles the initial homepage access and triggers Sablier middleware to wake up the deployment.
# It is separated from the main dbgate ingress because applying Sablier to all API/SSE traffic causes:
# 1. Extreme latency (minutes of hang) due to synchronous Sablier API checks on every API request.
# 2. Connection pool starvation (Head-of-line blocking) in the browser when multiple connections are held open.
# 3. Potential data loss in SSE/chunked streams because the plugin's responseWriter discards data until it's ready.
# dbgate-root has a higher priority ("100") than the direct dbgate ingress ("1") to handle the initial root requests.
# use default-sablierdbgate@kubernetescrd
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dbgate-root
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cluster-letsencrypt-dns-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: middleware-playonjan@kubernetescrd,middleware-antimitm@kubernetescrd,sso-domainx@kubernetescrd,default-sablierdbgate@kubernetescrd
    traefik.ingress.kubernetes.io/router.priority: "100"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Development
    gethomepage.dev/name: dbgate
    gethomepage.dev/icon: https://avatars.githubusercontent.com/u/78292618
    gethomepage.dev/href: https://dbgate.__{{infra.domains:f:x}}__/
    gethomepage.dev/weight: "40"
spec:
  ingressClassName: traefik
  rules:
    - host: dbgate.__{{infra.domains:f:x}}__
      http:
        paths:
          - path: /
            pathType: Exact
            backend:
              service:
                name: dbgate
                port:
                  name: default
  tls:
    - hosts:
        - dbgate.__{{infra.domains:f:x}}__
      secretName: dbgate-domainx

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dbgate
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cluster-letsencrypt-dns-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: middleware-playonjan@kubernetescrd,middleware-antimitm@kubernetescrd,sso-domainx@kubernetescrd
