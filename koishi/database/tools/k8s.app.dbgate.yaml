---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dbgate
  namespace: default
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - dbgate
          - dbgate-lite
  policyTypes:
    - Egress
  egress:
    # Allow communication to Kubernetes DNS service
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
    - to:
        - ipBlock:
            cidr: __{{koishi.infra.infos:f:subnetv4}}__.0/24

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ck-dev
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ck-prod

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ci-ipass

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ci-ipass

    # Allow access to specific external IP addresses only
    - to:
        - ipBlock:
            cidr: __{{db.ci-jsf.newsub.aws.prod:f:ip}}__/32
      ports:
        - protocol: TCP
          port: 3306
    - to:
        - ipBlock:
            cidr: __{{db.ci-jsf.newsub.aws.dev:f:ip}}__/32
      ports:
        - protocol: TCP
          port: 3306
