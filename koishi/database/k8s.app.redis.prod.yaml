---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: db-prod
  labels:
    app.kubernetes.io/name: redis
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      containers:
        - name: app
          image: redis/redis-stack-server:latest
          command: ["redis-stack-server"]
          args: ["--save", "", "--appendonly", "no"]
          ports:
            - name: default
              containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: db-prod
  labels:
    app.kubernetes.io/name: redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: default
      port: 6379
      targetPort: default
