---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: default
data:
  config.yaml: |
    model_list:
      - model_name: ollama-local
        litellm_params:
          model: ollama/qwen2.5-coder:7b
          api_base: "http://ollama"
      - model_name: balanced-model
        litellm_params:
          model: ollama/kimi-k2.5:cloud
          api_base: "http://ollama"
          rpm: 70
      - model_name: balanced-model
        litellm_params:
          model: gemini/gemini-2.5-flash
          rpm: 20
      - model_name: balanced-model
        litellm_params:
          model: anthropic/claude-3-haiku-20240307
          rpm: 10

    router_settings:
      routing_strategy: cost-based-routing
      allowed_fails: 3                      # Cool down the endpoint if it fails 3 consecutive times
      cooldown_time: 300                    # Cool down duration in seconds (5 minutes)

    litellm_settings:
      num_retries: 2
      timeout: 30
      cache: True
      cache_params:
        type: redis-semantic
        similarity_threshold: 0.8
        redis_url: "redis://db-redis.my-database:6379/0"
        redis_semantic_cache_embedding_model: ollama/bge-m3:latest

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: default
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      volumes:
        - name: config
          configMap:
            name: litellm-config
      containers:
        - name: app
          image: ghcr.io/berriai/litellm:main-stable
          args: [
              "--config",
              "/app/config.yaml",
              "--port",
              "4000",
              # "--detailed_debug",
            ]
          ports:
            - name: default
              containerPort: 4000
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          env:
            # - name: LITELLM_LOG
            #   value: DEBUG
            - name: OLLAMA_API_BASE
              value: "http://ollama"
            - name: LITELLM_MASTER_KEY
              value: "__{{koishi.litellm}}__"
            - name: LITELLM_SALT_KEY
              value: "__{{koishi.litellm:f:salt-key}}__"
            - name: DATABASE_URL
              value: "postgresql://litellm:__{{database.postgres.accounts:f:litellm}}__@db-postgres-prod.my-database:5432/litellm"
            - name: GEMINI_API_KEY
              value: "__{{llm.api-keys:f:gemini}}__"
            - name: ANTHROPIC_API_KEY
              value: "__{{llm.api-keys:f:claude}}__"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: default
  labels:
    app: litellm
spec:
  type: ClusterIP
  ports:
    - name: default
      port: 80
      protocol: TCP
      targetPort: default
  selector:
    app: litellm

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litellm
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cluster-letsencrypt-dns-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: middleware-playonjan@kubernetescrd,middleware-antimitm@kubernetescrd,sso-domainx@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: AI
    gethomepage.dev/name: LiteLLM
    gethomepage.dev/href: https://litellm.__{{infra.domains:f:x}}__/ui
    gethomepage.dev/icon: https://framerusercontent.com/images/GtfMdzyrMj6FQY6lGLqI6bh2LYM.png
    gethomepage.dev/siteMonitor: https://litellm.__{{infra.domains:f:x}}__
    gethomepage.dev/weight: "30"
spec:
  ingressClassName: traefik
  rules:
    - host: litellm.__{{infra.domains:f:x}}__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm
                port:
                  name: default
  tls:
    - hosts:
        - litellm.__{{infra.domains:f:x}}__
      secretName: litellm-domainx
