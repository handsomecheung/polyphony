---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wireproxy
  namespace: default
  labels:
    app.kubernetes.io/name: wireproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wireproxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wireproxy
    spec:
      nodeSelector:
        kubernetes.io/hostname: nur
      volumes:
        - name: default-common
          hostPath:
            path: /mnt/runtime-data-app/commondata
            type: Directory
      containers:
        - name: app
          # https://github.com/pufferffish/wireproxy
          image: cloudpublic/default/wireproxy:latest
          ports:
            - name: socks5
              containerPort: 1080
            - name: http
              containerPort: 8080
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - name: default-common
              mountPath: /etc/wireproxy/config
              subPath: wireproxy/wireproxy.config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi

---
apiVersion: v1
kind: Service
metadata:
  name: wireproxy
  namespace: default
  labels:
    app.kubernetes.io/name: wireproxy
spec:
  selector:
    app.kubernetes.io/name: wireproxy
  ports:
    - name: socks5
      port: 1080
      protocol: TCP
      targetPort: socks5
