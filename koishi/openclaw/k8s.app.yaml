---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-caddy-config
  namespace: default
data:
  Caddyfile: |
    :8080 {
        # Redirect /caddy-workspace to /caddy-workspace/
        @no_slash {
            path /caddy-workspace
        }
        redir @no_slash /caddy-workspace/

        handle_path /caddy-workspace/* {
            root * /srv/workspace
            route {
                vars stripped_path {path}
                @markdown {
                    file {
                        try_files {path}
                    }
                    path *.md
                }
                rewrite @markdown /_layout.html
                templates
                file_server browse
            }
        }
    }
  _layout.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="utf-8">
        <title>OpenClaw Notes</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
        <style>
            .markdown-body {
                box-sizing: border-box;
                min-width: 200px;
                max-width: 980px;
                margin: 0 auto;
                padding: 45px;
            }
            @media (max-width: 767px) {
                .markdown-body { padding: 15px; }
            }
        </style>
    </head>
    <body class="markdown-body">
        {{ include (placeholder "http.vars.stripped_path") | markdown }}
    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: default
  labels:
    app.kubernetes.io/name: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
    spec:
      nodeSelector:
        kubernetes.io/hostname: nur
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
        - name: data
          hostPath:
            path: /mnt/runtime-data-app/openclaw
            type: DirectoryOrCreate
        - name: coder-workspaces
          hostPath:
            path: /mnt/coder-workspaces
            type: DirectoryOrCreate
        - name: caddy-config
          configMap:
            name: openclaw-caddy-config
      initContainers:
        - name: init
          image: busybox:latest
          command: ["sh", "-c", "chown -R 1000:1000 /home/node/.openclaw"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
      containers:
        - name: openclaw
          image: cloudpublic/default/openclaw:latest
          ports:
            - name: default
              protocol: TCP
              containerPort: 18789
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
            - name: coder-workspaces
              mountPath: /mnt/coder-workspaces
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            - name: OPENCLAW_PUBLIC_DOMAIN
              value: "openclaw.__{{infra.domains:f:x}}__"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: default
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: default
            initialDelaySeconds: 15
            periodSeconds: 10
        - name: caddy
          image: caddy:latest
          ports:
            - name: caddy-http
              containerPort: 8080
          volumeMounts:
            - name: data
              subPath: workspace
              mountPath: /srv/workspace
            - name: caddy-config
              subPath: Caddyfile
              mountPath: /etc/caddy/Caddyfile
            - name: caddy-config
              subPath: _layout.html
              mountPath: /srv/workspace/_layout.html

---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: default
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: openclaw
  ports:
    - name: oc-gateway
      port: 80
      targetPort: default
      protocol: TCP
    - name: caddy-http
      port: 8080
      targetPort: caddy-http
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cluster-letsencrypt-dns-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: middleware-playonjan@kubernetescrd,middleware-antimitm@kubernetescrd,sso-domainx@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: AI
    gethomepage.dev/name: OpenClaw
    gethomepage.dev/icon: https://openclaw.ai/apple-touch-icon.png
    gethomepage.dev/href: https://openclaw.__{{infra.domains:f:x}}__
    gethomepage.dev/siteMonitor: https://openclaw.__{{infra.domains:f:x}}__
    gethomepage.dev/weight: "3"
spec:
  ingressClassName: traefik
  rules:
    - host: openclaw.__{{infra.domains:f:x}}__
      http:
        paths:
          - path: /caddy-workspace
            pathType: Prefix
            backend:
              service:
                name: openclaw
                port:
                  name: caddy-http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openclaw
                port:
                  name: oc-gateway
  tls:
    - hosts:
        - openclaw.__{{infra.domains:f:x}}__
      secretName: openclaw-domainx
