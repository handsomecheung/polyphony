---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-caddy-config
  namespace: default
data:
  Caddyfile: |
    :8080 {
        # Redirect /caddy-workspace to /caddy-workspace/
        @no_slash {
            path /caddy-workspace
        }
        redir @no_slash /caddy-workspace/

        handle_path /caddy-workspace/* {
            root * /srv
            route {
                vars stripped_path {path}
                @markdown {
                    file /workspace{path}
                    path *.md
                }
                rewrite @markdown /_layout.html
                templates
                
                @not_layout not path /_layout.html
                rewrite @not_layout /workspace{path}
                file_server browse
            }
        }
    }
  _layout.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>OpenClaw Notes</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
        <style>
            .markdown-body {
                box-sizing: border-box;
                min-width: 200px;
                max-width: 980px;
                margin: 0 auto;
                padding: 45px;
            }
            @media (max-width: 767px) {
                .markdown-body { padding: 15px; }
            }
        </style>
    </head>
    <body class="markdown-body">
        {{ include (printf "workspace%s" (placeholder "http.vars.stripped_path")) | markdown }}
    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: default
  labels:
    app.kubernetes.io/name: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
    spec:
      nodeSelector:
        kubernetes.io/hostname: nur
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
        - name: caddy-config
          configMap:
            name: openclaw-caddy-config
        - name: coder-workspaces
          hostPath:
            path: /mnt/coder-workspaces
            type: Directory
        - name: coder-sharepoint
          hostPath:
            path: /mnt/coder-sharepoint
            type: DirectoryOrCreate
      initContainers:
        - name: init
          image: busybox:latest
          command: ["sh", "-c", "chown -R 1000:1000 /data/default"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: coder-workspaces
              subPath: private-workspace/repos/local/openclaw-data/default
              mountPath: /data/default
      containers:
        - name: app
          image: cloudpublic/default/openclaw:latest
          command: ["openclaw", "gateway", "--bind", "lan", "--port", "18789"]
          env:
            - name: PATH
              value: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/node/.openclaw/bin"
            - name: OPENCLAW_PUBLIC_DOMAIN
              value: "openclaw.__{{infra.domains:f:x}}__"
            - name: OPENCLAW_GATEWAY_TOKEN
              value: "__{{openclaw.infos:f:secret}}__"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            - name: LITELLM_API_KEY
              value: "__{{koishi.litellm}}__"
            - name: LINE_CHANNEL_SECRET
              value: "__{{linebridge:f:channel-secret}}__"
            - name: LINE_CHANNEL_ACCESS_TOKEN
              value: "__{{linebridge:f:channel-access-token}}__"
            - name: GOG_ACCOUNT
              value: "__{{openclaw.infos:f:gog.email}}__"
            - name: GOG_KEYRING_PASSWORD
              value: "__{{openclaw.infos:f:gog.keyring_password}}__"
            - name: VW_URL
              value: https://vaultwarden.__{{infra.domains:f:x}}__
            - name: GEMINI_API_KEY
              value: "__{{llm.api-keys:f:gemini}}__"
          ports:
            - name: gateway
              protocol: TCP
              containerPort: 18789
          volumeMounts:
            - name: coder-workspaces
              subPath: private-workspace/repos/local/openclaw-data/default/data
              mountPath: /home/node/.openclaw
            - name: coder-workspaces
              subPath: private-workspace/repos/local/openclaw-data/default/config
              mountPath: /home/node/.config
            - name: coder-workspaces
              mountPath: /mnt/coder-workspaces
            - name: coder-sharepoint
              mountPath: /mnt/coder-sharepoint
          resources:
            requests:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 15
            periodSeconds: 10
        - name: caddy
          image: caddy:latest
          ports:
            - name: caddy-http
              containerPort: 8080
          volumeMounts:
            - name: caddy-config
              subPath: Caddyfile
              mountPath: /etc/caddy/Caddyfile
            - name: coder-workspaces
              subPath: private-workspace/repos/local/openclaw-data/default/data/workspace
              mountPath: /srv/workspace
            - name: caddy-config
              subPath: _layout.html
              mountPath: /srv/_layout.html

---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: default
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: openclaw
  ports:
    - name: oc-gateway
      port: 80
      targetPort: gateway
      protocol: TCP
    - name: caddy-http
      port: 8080
      targetPort: caddy-http
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cluster-letsencrypt-dns-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: middleware-playonjan@kubernetescrd,middleware-antimitm@kubernetescrd,sso-domainx@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: AI
    gethomepage.dev/name: OpenClaw
    gethomepage.dev/icon: https://openclaw.ai/apple-touch-icon.png
    gethomepage.dev/href: https://openclaw.__{{infra.domains:f:x}}__
    gethomepage.dev/siteMonitor: https://openclaw.__{{infra.domains:f:x}}__
    gethomepage.dev/weight: "3"
spec:
  ingressClassName: traefik
  rules:
    - host: openclaw.__{{infra.domains:f:x}}__
      http:
        paths:
          - path: /caddy-workspace
            pathType: Prefix
            backend:
              service:
                name: openclaw
                port:
                  name: caddy-http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openclaw
                port:
                  name: oc-gateway
  tls:
    - hosts:
        - openclaw.__{{infra.domains:f:x}}__
      secretName: openclaw-domainx

---
# called by Line Server
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-line-webhook
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cluster-letsencrypt-dns-cloudflare
spec:
  ingressClassName: traefik
  rules:
    - host: openclaw.__{{infra.domains:f:x}}__
      http:
        paths:
          - path: /line/webhook
            pathType: Prefix
            backend:
              service:
                name: openclaw
                port:
                  name: oc-gateway
  tls:
    - hosts:
        - openclaw.__{{infra.domains:f:x}}__
      secretName: openclaw-domainx

---
# called by linebridge
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-home4p
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cluster-letsencrypt-dns-cloudflare
spec:
  ingressClassName: traefik
  rules:
    - host: openclaw.home4p.__{{infra.domains:f:x}}__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openclaw
                port:
                  name: oc-gateway
  tls:
    - hosts:
        - openclaw.home4p.__{{infra.domains:f:x}}__
      secretName: openclaw-home4p.domainx
