<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Agent WebUI</title>
    <style>
      :root {
        --bg: #f5efe6;
        --panel: rgba(255, 251, 245, 0.88);
        --panel-strong: #fffaf2;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
        --accent-hover: #115e59;
        --border: rgba(15, 23, 42, 0.08);
        --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.18), transparent 35%),
          radial-gradient(circle at right, rgba(251, 146, 60, 0.2), transparent 30%),
          linear-gradient(180deg, #f8f3ea 0%, #efe5d6 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .app {
        width: min(920px, 100%);
        min-height: min(840px, calc(100vh - 48px));
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .hero {
        padding: 28px 28px 16px;
        border-bottom: 1px solid var(--border);
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.05;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
      }

      .layout {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      .viewer {
        flex: 1;
        padding: 24px 28px 28px;
        background: rgba(255, 255, 255, 0.28);
        overflow: auto;
      }

      .composer {
        padding: 20px 28px 24px;
        border-top: 1px solid var(--border);
        background: rgba(255, 250, 242, 0.96);
        backdrop-filter: blur(12px);
        position: sticky;
        bottom: 0;
      }

      .label {
        display: block;
        margin-bottom: 10px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .skills-panel {
        margin-bottom: 16px;
      }

      .skills-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .skill-tag {
        border: 1px solid rgba(15, 118, 110, 0.22);
        border-radius: 999px;
        padding: 8px 14px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      }

      .skill-tag:hover {
        border-color: rgba(15, 118, 110, 0.5);
      }

      .skill-tag.selected {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }

      .skill-tag:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      textarea {
        width: 100%;
        min-height: 220px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px 18px;
        font: inherit;
        color: inherit;
        background: var(--panel-strong);
        outline: none;
      }

      textarea:focus {
        border-color: rgba(15, 118, 110, 0.45);
        box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 22px;
        font: inherit;
        font-weight: 700;
        color: white;
        background: var(--accent);
        cursor: pointer;
        transition: background 0.2s ease, transform 0.2s ease;
      }

      button:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
        transform: none;
      }

      .status {
        font-size: 14px;
        color: var(--muted);
      }

      .card {
        background: var(--panel-strong);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
      }

      .card + .card {
        margin-top: 16px;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 14px;
        line-height: 1.6;
      }

      ul {
        margin: 10px 0 0;
        padding-left: 18px;
      }

      li + li {
        margin-top: 8px;
      }

      a.file-link {
        color: var(--accent);
        text-decoration: none;
      }

      a.file-link:hover {
        text-decoration: underline;
      }

      .empty {
        color: var(--muted);
      }

      @media (max-width: 780px) {
        body {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <h1>AI Agent WebUI</h1>
        <p>Send prompts over WebSocket and display the server response in the UI.</p>
      </section>
      <section class="layout">
        <section class="viewer">
          <div class="card">
            <span class="label">Response</span>
            <pre id="response" class="empty">Waiting for server response...</pre>
          </div>
          <div class="card">
            <span class="label">Files</span>
            <ul id="files">
              <li class="empty">No files yet</li>
            </ul>
          </div>
        </section>
      </section>
      <section class="composer">
        <div class="skills-panel">
          <span class="label">Skills</span>
          <div id="skills" class="skills-list">
            <span class="empty">Loading skills...</span>
          </div>
        </div>
        <label class="label" for="prompt">Prompt</label>
        <textarea id="prompt" placeholder="Enter your prompt or task"></textarea>
        <div class="actions">
          <button id="sendButton" type="button">Send</button>
          <span class="status" id="status">Disconnected</span>
        </div>
      </section>
    </main>

    <script>
      const promptInput = document.getElementById("prompt");
      const sendButton = document.getElementById("sendButton");
      const statusNode = document.getElementById("status");
      const responseNode = document.getElementById("response");
      const filesNode = document.getElementById("files");
      const skillsNode = document.getElementById("skills");

      let socket = null;
      const selectedSkills = new Set();

      function setStatus(text) {
        statusNode.textContent = text;
      }

      function setLoading(isLoading) {
        sendButton.disabled = isLoading;
        for (const element of skillsNode.querySelectorAll(".skill-tag")) {
          element.disabled = isLoading;
        }
      }

      function renderSkills(skills) {
        skillsNode.innerHTML = "";
        if (!skills.length) {
          const empty = document.createElement("span");
          empty.className = "empty";
          empty.textContent = "No skills available";
          skillsNode.appendChild(empty);
          return;
        }

        for (const skill of skills) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "skill-tag";
          button.textContent = skill;
          button.addEventListener("click", () => {
            if (selectedSkills.has(skill)) {
              selectedSkills.delete(skill);
              button.classList.remove("selected");
            } else {
              selectedSkills.add(skill);
              button.classList.add("selected");
            }
          });
          skillsNode.appendChild(button);
        }
      }

      async function loadSkills() {
        try {
          const response = await fetch("/skills");
          if (!response.ok) {
            throw new Error(`Failed to load skills: ${response.status}`);
          }
          const payload = await response.json();
          renderSkills(payload.skills || []);
        } catch (error) {
          skillsNode.innerHTML = "";
          const empty = document.createElement("span");
          empty.className = "empty";
          empty.textContent = String(error);
          skillsNode.appendChild(empty);
        }
      }

      function renderFiles(files) {
        filesNode.innerHTML = "";
        if (!files.length) {
          const item = document.createElement("li");
          item.className = "empty";
          item.textContent = "No files yet";
          filesNode.appendChild(item);
          return;
        }

        for (const file of files) {
          const item = document.createElement("li");
          const link = document.createElement("a");
          link.className = "file-link";
          link.href = `/download?path=${encodeURIComponent(file)}`;
          link.textContent = file.split("/").pop() || file;
          link.download = "";
          link.title = file;
          item.appendChild(link);
          filesNode.appendChild(item);
        }
      }

      function ensureSocket() {
        if (socket && socket.readyState === WebSocket.OPEN) {
          return Promise.resolve(socket);
        }

        if (socket && socket.readyState === WebSocket.CONNECTING) {
          return new Promise((resolve, reject) => {
            socket.addEventListener("open", () => resolve(socket), { once: true });
            socket.addEventListener("error", reject, { once: true });
          });
        }

        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        socket = new WebSocket(`${protocol}//${window.location.host}/ws`);
        setStatus("Connecting...");

        return new Promise((resolve, reject) => {
          socket.addEventListener(
            "open",
            () => {
              setStatus("Connected");
              resolve(socket);
            },
            { once: true }
          );
          socket.addEventListener(
            "error",
            () => {
              setStatus("Connection failed");
              reject(new Error("WebSocket connection failed."));
            },
            { once: true }
          );

          socket.addEventListener("close", () => {
            setStatus("Disconnected");
          });

          socket.addEventListener("message", (event) => {
            const payload = JSON.parse(event.data);
            if (payload.type === "status") {
              setStatus(payload.message);
              return;
            }
            if (payload.type === "error") {
              setLoading(false);
              setStatus("Request failed");
              responseNode.textContent = payload.message;
              responseNode.classList.remove("empty");
              renderFiles([]);
              return;
            }
            if (payload.type === "result") {
              setLoading(false);
              setStatus("Completed");
              responseNode.textContent = payload.data.response || "";
              responseNode.classList.remove("empty");
              renderFiles(payload.data.files || []);
              promptInput.value = "";
            }
          });
        });
      }

      async function sendPrompt() {
        const prompt = promptInput.value.trim();
        if (!prompt) {
          setStatus("Please enter a prompt");
          promptInput.focus();
          return;
        }

        const skillPrefix = Array.from(selectedSkills)
          .map((skill) => `USE SKILL ${skill}`)
          .join("\n");
        const finalPrompt = skillPrefix ? `${skillPrefix}\n\n${prompt}` : prompt;

        setLoading(true);
        responseNode.textContent = "Waiting for server response...";
        responseNode.classList.add("empty");
        renderFiles([]);

        try {
          const ws = await ensureSocket();
          setStatus("Sent");
          ws.send(JSON.stringify({ prompt: finalPrompt }));
        } catch (error) {
          setLoading(false);
          setStatus("Connection failed");
          responseNode.textContent = String(error);
          responseNode.classList.remove("empty");
        }
      }

      sendButton.addEventListener("click", sendPrompt);
      promptInput.addEventListener("keydown", (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
          sendPrompt();
        }
      });

      ensureSocket().catch(() => {});
      loadSkills();
    </script>
  </body>
</html>
