---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sabliergitnexusbackend
  namespace: default
spec:
  plugin:
    sablier:
      sablierUrl: "http://sablier.sablier"
      group: "gitnexus-backend"
      sessionDuration: "30m"
      blocking:
        timeout: 3m

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitnexus-backend
  namespace: default
  labels:
    app.kubernetes.io/name: gitnexus-backend
    sablier.enable: "true"
    sablier.group: "gitnexus-backend"
spec:
  replicas: 0
  selector:
    matchLabels:
      app: gitnexus-backend
  template:
    metadata:
      labels:
        app: gitnexus-backend
    spec:
      nodeSelector:
        kubernetes.io/hostname: nur
      volumes:
        - name: gitnexus-config
          hostPath:
            path: /mnt/coder-workspaces/private-workspace/workspace/encrypted-configs/gitnexus
            type: Directory
        - name: coder-workspaces
          hostPath:
            path: /mnt/coder-workspaces
            type: Directory
      containers:
        - name: app
          image: ghcr.io/abhigyanpatwari/gitnexus:latest
          imagePullPolicy: Always
          ports:
            - name: default
              containerPort: 4747
              protocol: TCP
          volumeMounts:
            - name: gitnexus-config
              mountPath: /data/gitnexus
            - name: coder-workspaces
              mountPath: /mnt/coder-workspaces
          startupProbe:
            httpGet:
              path: /api/health
              port: default
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: default
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: default
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: gitnexus-backend
  namespace: default
  labels:
    app.kubernetes.io/name: gitnexus-backend
spec:
  type: ClusterIP
  selector:
    app: gitnexus-backend
  ports:
    - name: default
      port: 80
      protocol: TCP
      targetPort: default

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitnexus-backend
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cluster-letsencrypt-dns-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: middleware-antimitm@kubernetescrd,sso-domainx@kubernetescrd,default-sabliergitnexusbackend@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: gitnexus.__{{infra.domains:f:x}}__
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: gitnexus-backend
                port:
                  name: default
  tls:
    - hosts:
        - gitnexus.__{{infra.domains:f:x}}__
      secretName: gitnexus-domainx

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sabliergitnexusweb
  namespace: default
spec:
  plugin:
    sablier:
      sablierUrl: "http://sablier.sablier"
      group: "gitnexus-web"
      sessionDuration: "30m"
      dynamic:
        theme: "ghost"
        showDetails: true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitnexus-web
  namespace: default
  labels:
    app.kubernetes.io/name: gitnexus-web
    sablier.enable: "true"
    sablier.group: "gitnexus-web"
spec:
  replicas: 0
  selector:
    matchLabels:
      app: gitnexus-web
  template:
    metadata:
      labels:
        app: gitnexus-web
    spec:
      containers:
        - name: app
          image: ghcr.io/abhigyanpatwari/gitnexus-web:latest
          imagePullPolicy: Always
          env:
            - name: GITNEXUS_BACKEND_URL
              value: "https://gitnexus.__{{infra.domains:f:x}}__"
          ports:
            - name: default
              containerPort: 4173
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: default
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: default
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: default
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: gitnexus-web
  namespace: default
  labels:
    app.kubernetes.io/name: gitnexus-web
spec:
  type: ClusterIP
  selector:
    app: gitnexus-web
  ports:
    - name: default
      port: 80
      protocol: TCP
      targetPort: default

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitnexus-web
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cluster-letsencrypt-dns-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: middleware-antimitm@kubernetescrd,sso-domainx@kubernetescrd,default-sabliergitnexusweb@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Tool
    gethomepage.dev/name: GitNexus
    gethomepage.dev/href: https://gitnexus.__{{infra.domains:f:x}}__
    gethomepage.dev/weight: "55"
spec:
  ingressClassName: traefik
  rules:
    - host: gitnexus.__{{infra.domains:f:x}}__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitnexus-web
                port:
                  name: default
  tls:
    - hosts:
        - gitnexus.__{{infra.domains:f:x}}__
      secretName: gitnexus-domainx
