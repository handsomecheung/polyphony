---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sabliergollum
  namespace: default
spec:
  plugin:
    sablier:
      sablierUrl: "http://sablier.sablier"
      group: "gollum"
      sessionDuration: "1h"
      dynamic:
        theme: "ghost"
        showDetails: true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gollum
  namespace: default
  labels:
    app.kubernetes.io/name: gollum
    sablier.enable: "true"
    sablier.group: "gollum"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: gollum
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gollum
    spec:
      volumes:
        - name: notebook
          hostPath:
            path: /mnt/coder-workspaces/private-workspace/repos/local/notebook
            type: Directory
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      nodeSelector:
        kubernetes.io/hostname: nur
      containers:
        - name: app
          image: gollumwiki/gollum:6.0
          imagePullPolicy: Always
          volumeMounts:
            - name: notebook
              mountPath: /wiki
              readOnly: true
          ports:
            - name: default
              protocol: TCP
              containerPort: 4567
          resources:
            requests:
              cpu: 100m
              memory: 156Mi

---
apiVersion: v1
kind: Service
metadata:
  name: gollum
  namespace: default
  labels:
    app.kubernetes.io/name: gollum
  annotations:
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gollum
  ports:
    - name: default
      port: 80
      protocol: TCP
      targetPort: default

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gollum
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cluster-letsencrypt-dns-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: middleware-playonjan@kubernetescrd,middleware-antimitm@kubernetescrd,sso-domainx@kubernetescrd,default-sabliergollum@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Tool
    gethomepage.dev/href: https://gollum.__{{infra.domains:f:x}}__
    gethomepage.dev/weight: "80"
spec:
  ingressClassName: traefik
  rules:
    - host: gollum.__{{infra.domains:f:x}}__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gollum
                port:
                  name: default
  tls:
    - hosts:
        - gollum.__{{infra.domains:f:x}}__
      secretName: gollum-domainx
