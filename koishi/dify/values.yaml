---
# Dify Helm Chart Values
# Documentation: https://github.com/langgenius/dify-helm/blob/main/charts/dify/values.yaml

# Global Configuration
global:
  # openssl rand -base64 42
  appSecretKey: "wqY8y5MqTYb6Iv46XJcqKg1jYMmnuFWmWPRsRd4eihBRAcp4MklRhew1"
  innerApiKey: "O02mK3Ib6C+xeuxWXijx/LCanzqY8w6QPh8ceaShjFeSm4TViYXaKUSa"
  useTLS: true
  externalPort: 443

  consoleWebDomain: "dify.home4p.__{{infra.domains:f:x}}__"
  consoleApiDomain: "api-dify.home4p.__{{infra.domains:f:x}}__"
  serviceApiDomain: "service-dify.home4p.__{{infra.domains:f:x}}__"
  appWebDomain: "app-dify.home4p.__{{infra.domains:f:x}}__"
  appApiDomain: "app-api-dify.home4p.__{{infra.domains:f:x}}__"
  filesDomain: "files-dify.home4p.__{{infra.domains:f:x}}__"
  enterpriseDomain: "ent-dify.home4p.__{{infra.domains:f:x}}__"
  triggerDomain: "trigger-dify.home4p.__{{infra.domains:f:x}}__"

# Persistence Configration
persistence:
  type: "local"
  local:
    persistentVolumeClaim:
      existingClaim: "dify-api-pvc"

# Global Node Selector to ensure all components run on 'nur'
# (Dify components)
api:
  replicaCount: 1
  nodeSelector:
    kubernetes.io/hostname: nur
  service:
    type: ClusterIP

worker:
  replicaCount: 1
  nodeSelector:
    kubernetes.io/hostname: nur

web:
  replicaCount: 1
  nodeSelector:
    kubernetes.io/hostname: nur
  service:
    type: ClusterIP
  extraEnv:
    - name: HOSTNAME
      value: "0.0.0.0"

enterpriseFrontend:
  nodeSelector:
    kubernetes.io/hostname: nur
  extraEnv:
    - name: HOSTNAME
      value: "0.0.0.0"

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: cluster-letsencrypt-dns-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: middleware-antimitm@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: AI
    gethomepage.dev/name: Dify
    gethomepage.dev/icon: dify
    gethomepage.dev/href: https://dify.home4p.__{{infra.domains:f:x}}__/
  hostname: dify.home4p.__{{infra.domains:f:x}}__
  tls:
    - hosts:
        - "dify.home4p.__{{infra.domains:f:x}}__"
        - "api-dify.home4p.__{{infra.domains:f:x}}__"
        - "service-dify.home4p.__{{infra.domains:f:x}}__"
        - "app-dify.home4p.__{{infra.domains:f:x}}__"
        - "app-api-dify.home4p.__{{infra.domains:f:x}}__"
        - "files-dify.home4p.__{{infra.domains:f:x}}__"
        - "ent-dify.home4p.__{{infra.domains:f:x}}__"
        - "trigger-dify.home4p.__{{infra.domains:f:x}}__"
      secretName: dify-home4p-domainx

# Dependency configuration using Local Storage (PV/PVC defined in k8s.storage.yaml)
postgresql:
  enabled: false

# External Database Configuration
externalDatabase:
  enabled: true
  engine: "postgres"
  host: dify-postgres
  port: 5432
  user: dify
  password: "TPSTUvntXQ1fK6nIl-fF"
  databases:
    dify: "dify"
    enterprise: "enterprise"
    audit: "audit"
    plugin_daemon: "plugin_daemon"
  dialectOptions:
    postgres:
      sslMode: "disable"

redis:
  enabled: false

# External Redis Configuration
externalRedis:
  enabled: true
  host: redis.db-prod
  port: 6379
  # password: ""
  db: 6

weaviate:
  enabled: true
  nodeSelector:
    kubernetes.io/hostname: nur
  persistence:
    enabled: true
    existingClaim: "dify-weaviate-pvc"
  authentication:
    apikey:
      enabled: false

# Ensure other components also run on nur
gateway:
  nodeSelector:
    kubernetes.io/hostname: nur

enterprise:
  nodeSelector:
    kubernetes.io/hostname: nur

plugin_manager:
  nodeSelector:
    kubernetes.io/hostname: nur

sandbox:
  nodeSelector:
    kubernetes.io/hostname: nur

ssrf_proxy:
  nodeSelector:
    kubernetes.io/hostname: nur

trigger_worker:
  nodeSelector:
    kubernetes.io/hostname: nur

worker_beat:
  nodeSelector:
    kubernetes.io/hostname: nur
