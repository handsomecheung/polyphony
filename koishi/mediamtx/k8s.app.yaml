---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediamtx
  namespace: default
  labels:
    app.kubernetes.io/name: mediamtx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mediamtx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mediamtx
    spec:
      nodeSelector:
        kubernetes.io/hostname: nur
      volumes:
        - name: mediamtx
          hostPath:
            path: /mnt/user-data-others/data/mediamtx
            type: Directory
      containers:
        - name: app
          # https://github.com/bluenviron/mediamtx
          image: cloudprivate/default/mediamtx:latest
          imagePullPolicy: Always
          args: ["/config/mediamtx.yml"]
          ports:
            - name: hls
              containerPort: 8888
            - name: rtsps
              containerPort: 8322
          volumeMounts:
            - name: mediamtx
              mountPath: /data/mediamtx
              readOnly: true

---
# kubecutl expose deployment devbox --port 3738 --target-port 22 --name devbox --type=LoadBalancer
apiVersion: v1
kind: Service
metadata:
  name: mediamtx-rtsp
  namespace: default
  labels:
    app.kubernetes.io/name: mediamtx
  finalizers:
    - service.kubernetes.io/load-balancer-cleanup
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: mediamtx
  allocateLoadBalancerNodePorts: true
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - name: rtsps
      port: 37007
      protocol: TCP
      targetPort: rtsps

---
apiVersion: v1
kind: Service
metadata:
  name: mediamtx-hls
  namespace: default
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mediamtx
  ports:
    - name: hls
      port: 80
      protocol: TCP
      targetPort: hls

---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: mediamtxbasicauth
  namespace: default
data:
  auth: __{{mediamtx.basicauth.hh:f:base64}}__

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mediamtxbasicauth
  namespace: default
spec:
  basicAuth:
    secret: mediamtxbasicauth

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mediamtx-hls
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cluster-letsencrypt-dns-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: middleware-antimitm@kubernetescrd,default-mediamtxbasicauth@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: mediamtx.__{{infra.domains:f:x}}__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mediamtx-hls
                port:
                  name: hls
  tls:
    - hosts:
        - mediamtx.__{{infra.domains:f:x}}__
      secretName: mediamtx-domainx
